<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장애공감 가로세로퀴즈</title>
  <style>
    :root {
      --bg1: #fffefe;
      --bg2: #fff7fb;
      --pink: #f04f98;
      --pink-dark: #e7458c;
      --pink-light: #ffe7f1;
      --text: #2f3550;
      --muted: #7f8398;
      --panel: #ffffff;
      --shadow: 0 12px 32px rgba(210, 181, 196, 0.18);
      --cell-size: 46px;
      --cell-gap: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 14px 28px;
    }

    .top-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .top-header h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 64px);
      line-height: 1.05;
      font-weight: 900;
      color: var(--pink);
      letter-spacing: -0.03em;
    }

    .top-row {
      margin-top: 14px;
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .progress-shell {
      min-width: min(560px, 92vw);
      max-width: 720px;
      background: #fff;
      border-radius: 999px;
      padding: 14px 18px;
      box-shadow: 0 6px 18px rgba(218, 183, 198, 0.28);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      flex: 1;
      height: 12px;
      background: #fdeaf2;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff82af, #f04f98);
    }

    .progress-text {
      font-weight: 800;
      color: #5c4450;
      white-space: nowrap;
    }

    .timer-pill {
      background: #fff;
      padding: 14px 20px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(218, 183, 198, 0.28);
      font-weight: 900;
      color: #5c4450;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border-radius: 30px;
      box-shadow: var(--shadow);
    }

    .board-panel {
      padding: 24px;
      min-height: 760px;
    }

    .board-top-note {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .board-wrap {
      overflow: auto;
      padding-bottom: 8px;
    }

    .board {
      display: grid;
      gap: var(--cell-gap);
      width: max-content;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: 2px solid #f9d5e1;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 3px 10px rgba(240, 79, 152, 0.12);
      position: relative;
      transition: transform .12s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .cell:hover {
      transform: translateY(-1px);
    }

    .cell input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      text-align: center;
      background: transparent;
      font-size: 24px;
      font-weight: 800;
      color: #444;
    }

    .cell-number {
      position: absolute;
      top: 3px;
      left: 6px;
      font-size: 10px;
      font-weight: 900;
      color: #ff5b8f;
      pointer-events: none;
    }

    .block {
      visibility: hidden;
      border: none;
      box-shadow: none;
      background: transparent;
    }

    .cell.active {
      border-color: #ff5e97;
      box-shadow: 0 0 0 4px rgba(240, 79, 152, .13), 0 6px 14px rgba(240, 79, 152, .16);
    }

    .cell.correct input {
      background: #e9fff0;
      color: #137a43;
    }

    .cell.wrong input {
      background: #fff1f6;
      color: #b83063;
    }

    .sidebar {
      overflow: hidden;
    }

    .sidebar-header {
      background: linear-gradient(90deg, #ff759f, #ee5b97);
      color: #fff;
      padding: 18px 20px;
      font-size: 20px;
      font-weight: 900;
    }

    .sidebar-body {
      padding: 16px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 18px;
      color: #5b4450;
    }

    .clue-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .clue-card {
      width: 100%;
      text-align: left;
      border: 1px solid #f7edf2;
      background: #fff;
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(180, 183, 201, .12);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .clue-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(180, 183, 201, .14);
    }

    .clue-card.active {
      border-color: #ff8ab5;
      box-shadow: 0 0 0 4px rgba(240, 79, 152, .08), 0 10px 24px rgba(180, 183, 201, .16);
    }

    .clue-card.correct {
      background: #f0fff5;
      border-color: #bfeacc;
    }

    .clue-card.wrong {
      background: #fff7f9;
      border-color: #ffd2df;
    }

    .clue-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .badge {
      min-width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      flex-shrink: 0;
    }

    .badge.across {
      background: #ff4d7e;
    }

    .badge.down {
      background: #40b7f5;
    }

    .clue-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .chip.dir {
      background: #fff6e8;
      color: #ff8c42;
    }

    .chip.initial {
      background: #f8f1ff;
      color: #7950c8;
    }

    .chip.length {
      background: #eef7ff;
      color: #2670c7;
    }

    .clue-text {
      margin: 0;
      line-height: 1.55;
      color: var(--text);
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    button.action-btn {
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .12s ease, opacity .2s ease;
    }

    button.action-btn:hover {
      transform: translateY(-1px);
      opacity: .95;
    }

    .submit-btn {
      background: linear-gradient(90deg, #ff709d, #ee5b97);
      color: #fff;
    }

    .reset-btn {
      background: #5d5157;
      color: #fff;
    }

    .result-box {
      margin-top: 12px;
      padding: 12px 4px 4px;
      font-weight: 800;
      color: #5b4450;
      line-height: 1.55;
    }

    .helper {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .board-panel {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      :root {
        --cell-size: 40px;
        --cell-gap: 8px;
      }

      .app {
        padding: 16px 10px 20px;
      }

      .sidebar-body {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-header">
      <h1 id="pageTitle">장애공감 가로세로퀴즈</h1>
      <div class="top-row">
        <div class="progress-shell">
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div class="progress-text">
            <span id="solvedCount">0</span> / <span id="totalCount">0</span> 완성!
          </div>
        </div>
        <div class="timer-pill">⏱ <span id="timer">00:00</span></div>
      </div>
    </header>

    <main class="layout">
      <section class="panel board-panel">
        <div class="board-top-note">
          힌트 카드를 클릭하면 해당 단어가 강조됩니다. 같은 칸에 가로/세로가 겹치면 그 칸을 한 번 더 클릭해 방향을 바꿀 수 있습니다.
        </div>
        <div class="board-wrap">
          <div id="board" class="board" aria-label="가로세로 퀴즈 판"></div>
        </div>
      </section>

      <aside class="panel sidebar">
        <div class="sidebar-header">📖 지혜의 열쇠</div>
        <div class="sidebar-body">
          <section>
            <h2 class="section-title">가로</h2>
            <div id="acrossList" class="clue-list"></div>
          </section>

          <section style="margin-top:16px;">
            <h2 class="section-title">세로</h2>
            <div id="downList" class="clue-list"></div>
          </section>

          <div class="actions">
            <button id="submitBtn" class="action-btn submit-btn">제출하기</button>
            <button id="resetBtn" class="action-btn reset-btn">모든 기록 초기화</button>
          </div>

          <div id="resultBox" class="result-box"></div>
          <div class="helper">입력값, 진행도, 타이머는 현재 브라우저에 자동 저장됩니다.</div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const PUZZLE = {
      title: "장애공감 가로세로퀴즈",
      size: 14,
      storageKey: "disability-crossword-demo-v1",
      words: [
        { id: "a1",  no: 1,  dir: "across", row: 0,  col: 0,  answer: "배리어프리", hint: "장애인과 비장애인 모두가 불편 없이 이용할 수 있도록 물리적·제도적 장벽을 없애려는 개념." },
        { id: "d1",  no: 1,  dir: "down",   row: 0,  col: 0,  answer: "배려",       hint: "다른 사람을 존중하고 도와주려는 마음." },
        { id: "a3",  no: 3,  dir: "across", row: 2,  col: 4,  answer: "보조기기",   hint: "장애인의 이동, 의사소통, 학습, 생활을 돕는 각종 장치." },
        { id: "a5",  no: 5,  dir: "across", row: 0,  col: 9,  answer: "점자",       hint: "시각장애인이 손끝으로 읽을 수 있도록 만든 문자." },
        { id: "d6",  no: 6,  dir: "down",   row: 0,  col: 10, answer: "자립",       hint: "도움을 받더라도 삶을 스스로 꾸려 나가는 것." },
        { id: "d4",  no: 4,  dir: "down",   row: 0,  col: 12, answer: "리프트",     hint: "휠체어 이용자가 층을 오르내릴 때 도움을 주는 장치." },
        { id: "d12", no: 12, dir: "down",   row: 4,  col: 10, answer: "이동권",     hint: "누구나 안전하고 자유롭게 이동할 권리." },
        { id: "a7",  no: 7,  dir: "across", row: 6,  col: 0,  answer: "경사로",     hint: "휠체어나 유모차가 계단 대신 이동할 수 있도록 만든 비탈길." },
        { id: "d8",  no: 8,  dir: "down",   row: 6,  col: 1,  answer: "사회",       hint: "서로 다른 사람들이 함께 살아가는 공동체." },
        { id: "a9",  no: 9,  dir: "across", row: 8,  col: 5,  answer: "인권",       hint: "사람이라면 누구나 당연히 누려야 하는 기본적인 권리." },
        { id: "d9",  no: 9,  dir: "down",   row: 8,  col: 5,  answer: "인식",       hint: "대상을 이해하고 받아들이는 생각이나 태도." },
        { id: "a11", no: 11, dir: "across", row: 10, col: 3,  answer: "포용",       hint: "다름을 배척하지 않고 넓게 품는 태도." },
        { id: "d14", no: 14, dir: "down",   row: 9,  col: 12, answer: "공감",       hint: "다른 사람의 생각이나 감정을 함께 느끼고 이해하는 것." },
        { id: "a13", no: 13, dir: "across", row: 12, col: 0,  answer: "존중",       hint: "상대의 존재와 권리를 소중히 여기는 태도." },
        { id: "a15", no: 15, dir: "across", row: 12, col: 8,  answer: "수어",       hint: "손동작, 표정, 몸짓으로 의미를 전달하는 언어." }
      ]
    };

    const els = {
      pageTitle: document.getElementById("pageTitle"),
      board: document.getElementById("board"),
      acrossList: document.getElementById("acrossList"),
      downList: document.getElementById("downList"),
      progressFill: document.getElementById("progressFill"),
      solvedCount: document.getElementById("solvedCount"),
      totalCount: document.getElementById("totalCount"),
      timer: document.getElementById("timer"),
      submitBtn: document.getElementById("submitBtn"),
      resetBtn: document.getElementById("resetBtn"),
      resultBox: document.getElementById("resultBox")
    };

    const state = {
      grid: null,
      elapsedSec: 0,
      submitted: false,
      activeWordId: null,
      timerId: null
    };

    const wordsById = new Map(PUZZLE.words.map(word => [word.id, word]));

    function normalizeText(text) {
      return String(text || "").replace(/\s+/g, "").trim();
    }

    function splitChars(text) {
      return Array.from(normalizeText(text));
    }

    function getWordCells(word) {
      const chars = splitChars(word.answer);
      return chars.map((char, index) => ({
        row: word.row + (word.dir === "down" ? index : 0),
        col: word.col + (word.dir === "across" ? index : 0),
        char
      }));
    }

    function getInitialConsonants(text) {
      const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
      return splitChars(text).map(char => {
        const code = char.charCodeAt(0) - 44032;
        if (code >= 0 && code <= 11171) {
          return CHO[Math.floor(code / 588)];
        }
        return char;
      }).join("");
    }

    function buildGrid() {
      const grid = new Map();

      for (const word of PUZZLE.words) {
        const cells = getWordCells(word);

        if (cells.length === 0) {
          throw new Error(`정답이 비어 있는 단어가 있습니다: ${word.id}`);
        }

        for (let i = 0; i < cells.length; i++) {
          const { row, col, char } = cells[i];

          if (row < 0 || col < 0 || row >= PUZZLE.size || col >= PUZZLE.size) {
            throw new Error(`${word.id}가 퍼즐 범위를 벗어났습니다. row=${row}, col=${col}`);
          }

          const key = `${row}-${col}`;

          if (!grid.has(key)) {
            grid.set(key, {
              row,
              col,
              solution: char,
              wordIds: [word.id],
              startNos: i === 0 ? [word.no] : []
            });
          } else {
            const existing = grid.get(key);
            if (existing.solution !== char) {
              throw new Error(`단어 배치 충돌: (${row}, ${col})에 '${existing.solution}'와 '${char}'가 겹칩니다.`);
            }
            if (!existing.wordIds.includes(word.id)) {
              existing.wordIds.push(word.id);
            }
            if (i === 0) {
              existing.startNos.push(word.no);
            }
          }
        }
      }

      for (const cell of grid.values()) {
        cell.startNos = [...new Set(cell.startNos)];
      }

      return grid;
    }

    function formatTime(totalSeconds) {
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const hh = String(hours).padStart(2, "0");
      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");
      return hours > 0 ? `${hh}:${mm}:${ss}` : `${mm}:${ss}`;
    }

    function updateTimerText() {
      els.timer.textContent = formatTime(state.elapsedSec);
    }

    function getCellKey(row, col) {
      return `${row}-${col}`;
    }

    function getInput(row, col) {
      return els.board.querySelector(`input[data-row="${row}"][data-col="${col}"]`);
    }

    function getCellElement(row, col) {
      return els.board.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
    }

    function getWordById(wordId) {
      return wordsById.get(wordId);
    }

    function getPreferredWordIdForCell(wordIds, toggle = false) {
      if (!wordIds || wordIds.length === 0) return null;
      if (wordIds.length === 1) return wordIds[0];

      if (state.activeWordId && wordIds.includes(state.activeWordId)) {
        if (!toggle) return state.activeWordId;
        const currentIndex = wordIds.indexOf(state.activeWordId);
        return wordIds[(currentIndex + 1) % wordIds.length];
      }

      return wordIds.find(id => getWordById(id).dir === "across") || wordIds[0];
    }

    function selectWord(wordId) {
      if (!wordId) return;

      state.activeWordId = wordId;

      document.querySelectorAll(".clue-card").forEach(card => {
        card.classList.toggle("active", card.dataset.wordId === wordId);
      });

      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("active");
      });

      const word = getWordById(wordId);
      if (!word) return;

      for (const cellInfo of getWordCells(word)) {
        const cell = getCellElement(cellInfo.row, cellInfo.col);
        if (cell) cell.classList.add("active");
      }

      saveState();
    }

    function focusWord(wordId) {
      const word = getWordById(wordId);
      if (!word) return;

      const cells = getWordCells(word);
      let target = cells[0];

      for (const cell of cells) {
        const input = getInput(cell.row, cell.col);
        if (input && !normalizeText(input.value)) {
          target = cell;
          break;
        }
      }

      const input = getInput(target.row, target.col);
      if (input) input.focus();
    }

    function moveInActiveWord(currentRow, currentCol, step) {
      if (!state.activeWordId) return;

      const word = getWordById(state.activeWordId);
      if (!word) return;

      const cells = getWordCells(word);
      const index = cells.findIndex(cell => cell.row === currentRow && cell.col === currentCol);
      if (index === -1) return;

      const target = cells[index + step];
      if (!target) return;

      const input = getInput(target.row, target.col);
      if (input) input.focus();
    }

    function getUserAnswer(wordId) {
      const word = getWordById(wordId);
      if (!word) return "";
      return getWordCells(word)
        .map(cell => normalizeText(getInput(cell.row, cell.col)?.value || ""))
        .join("");
    }

    function isWordCorrect(wordId) {
      const word = getWordById(wordId);
      if (!word) return false;
      return getUserAnswer(wordId) === normalizeText(word.answer);
    }

    function updateProgress() {
      const total = PUZZLE.words.length;
      const solved = PUZZLE.words.filter(word => isWordCorrect(word.id)).length;

      els.totalCount.textContent = total;
      els.solvedCount.textContent = solved;
      els.progressFill.style.width = `${(solved / total) * 100}%`;
    }

    function setInputsDisabled(disabled) {
      els.board.querySelectorAll("input").forEach(input => {
        input.disabled = disabled;
      });
    }

    function gradePuzzle() {
      const statusMap = new Map();

      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("correct", "wrong");
      });

      document.querySelectorAll(".clue-card").forEach(card => {
        card.classList.remove("correct", "wrong");
      });

      for (const word of PUZZLE.words) {
        const ok = isWordCorrect(word.id);
        statusMap.set(word.id, ok);

        const clueCard = document.querySelector(`.clue-card[data-word-id="${word.id}"]`);
        if (clueCard) {
          clueCard.classList.add(ok ? "correct" : "wrong");
        }
      }

      for (const [key, cellData] of state.grid.entries()) {
        const cell = els.board.querySelector(`.cell[data-key="${key}"]`);
        if (!cell) continue;

        const statuses = cellData.wordIds.map(wordId => statusMap.get(wordId));
        if (statuses.every(Boolean)) {
          cell.classList.add("correct");
        } else if (statuses.some(status => status === false)) {
          cell.classList.add("wrong");
        }
      }

      const correctCount = [...statusMap.values()].filter(Boolean).length;
      const wrongWords = PUZZLE.words
        .filter(word => !statusMap.get(word.id))
        .map(word => `${word.dir === "across" ? "가로" : "세로"} ${word.no}`)
        .join(", ");

      els.resultBox.innerHTML = wrongWords
        ? `채점 완료: <strong>${correctCount} / ${PUZZLE.words.length}</strong> 정답 · 소요 시간 <strong>${formatTime(state.elapsedSec)}</strong><br>미완성 또는 오답: ${wrongWords}`
        : `채점 완료: <strong>${correctCount} / ${PUZZLE.words.length}</strong> 정답 · 소요 시간 <strong>${formatTime(state.elapsedSec)}</strong><br>모든 문제가 정답입니다. 🎉`;

      return statusMap;
    }

    function saveState() {
      const inputs = {};
      els.board.querySelectorAll("input").forEach(input => {
        inputs[getCellKey(input.dataset.row, input.dataset.col)] = input.value;
      });

      localStorage.setItem(PUZZLE.storageKey, JSON.stringify({
        inputs,
        elapsedSec: state.elapsedSec,
        submitted: state.submitted,
        activeWordId: state.activeWordId
      }));
    }

    function loadState() {
      const raw = localStorage.getItem(PUZZLE.storageKey);
      if (!raw) return;

      try {
        const saved = JSON.parse(raw);

        if (saved.inputs) {
          Object.entries(saved.inputs).forEach(([key, value]) => {
            const [row, col] = key.split("-");
            const input = getInput(row, col);
            if (input) input.value = value || "";
          });
        }

        state.elapsedSec = Number(saved.elapsedSec) || 0;
        state.submitted = Boolean(saved.submitted);
        state.activeWordId = saved.activeWordId || null;
      } catch (error) {
        console.error("저장된 상태를 불러오지 못했습니다.", error);
      }
    }

    function clearSavedState() {
      localStorage.removeItem(PUZZLE.storageKey);
    }

    function startTimer() {
      stopTimer();
      if (state.submitted) return;

      state.timerId = setInterval(() => {
        state.elapsedSec += 1;
        updateTimerText();
        saveState();
      }, 1000);
    }

    function stopTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function resetPuzzle() {
      stopTimer();
      state.elapsedSec = 0;
      state.submitted = false;
      els.resultBox.textContent = "";

      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("correct", "wrong", "active");
      });

      document.querySelectorAll(".clue-card").forEach(card => {
        card.classList.remove("correct", "wrong", "active");
      });

      els.board.querySelectorAll("input").forEach(input => {
        input.value = "";
      });

      clearSavedState();
      setInputsDisabled(false);
      updateTimerText();
      updateProgress();

      const firstAcross = PUZZLE.words.find(word => word.dir === "across")?.id || PUZZLE.words[0]?.id;
      if (firstAcross) selectWord(firstAcross);

      startTimer();
      saveState();
    }

    function renderClues() {
      const renderList = (dir, target) => {
        const words = PUZZLE.words
          .filter(word => word.dir === dir)
          .sort((a, b) => a.no - b.no);

        target.innerHTML = "";

        for (const word of words) {
          const card = document.createElement("div");
          card.className = "clue-card";
          card.dataset.wordId = word.id;
          card.tabIndex = 0;

          card.innerHTML = `
            <div class="clue-head">
              <span class="badge ${dir}">${word.no}</span>
              <div>
                <div class="clue-meta">
                  <span class="chip dir">${dir === "across" ? "가로" : "세로"}</span>
                  <span class="chip initial">초성 ${getInitialConsonants(word.answer)}</span>
                  <span class="chip length">${splitChars(word.answer).length}글자</span>
                </div>
              </div>
            </div>
            <p class="clue-text">${word.hint}</p>
          `;

          const handleSelect = () => {
            selectWord(word.id);
            focusWord(word.id);
          };

          card.addEventListener("click", handleSelect);
          card.addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              handleSelect();
            }
          });

          target.appendChild(card);
        }
      };

      renderList("across", els.acrossList);
      renderList("down", els.downList);
    }

    function renderBoard() {
      els.board.innerHTML = "";
      els.board.style.gridTemplateColumns = `repeat(${PUZZLE.size}, var(--cell-size))`;

      for (let row = 0; row < PUZZLE.size; row++) {
        for (let col = 0; col < PUZZLE.size; col++) {
          const key = getCellKey(row, col);
          const cellData = state.grid.get(key);

          if (!cellData) {
            const block = document.createElement("div");
            block.className = "cell block";
            els.board.appendChild(block);
            continue;
          }

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.row = row;
          cell.dataset.col = col;
          cell.dataset.key = key;
          cell.dataset.wordIds = cellData.wordIds.join(",");

          if (cellData.startNos.length) {
            const number = document.createElement("span");
            number.className = "cell-number";
            number.textContent = cellData.startNos[0];
            cell.appendChild(number);
          }

          const input = document.createElement("input");
          input.type = "text";
          input.maxLength = 1;
          input.autocomplete = "off";
          input.spellcheck = false;
          input.dataset.row = row;
          input.dataset.col = col;
          input.setAttribute("aria-label", `${row + 1}행 ${col + 1}열`);

          input.addEventListener("focus", () => {
            const preferred = getPreferredWordIdForCell(cellData.wordIds, false);
            selectWord(preferred);
          });

          cell.addEventListener("click", () => {
            const nextWordId = getPreferredWordIdForCell(cellData.wordIds, true);
            selectWord(nextWordId);
            input.focus();
          });

          input.addEventListener("input", event => {
            const raw = normalizeText(event.target.value);
            const chars = Array.from(raw);
            event.target.value = chars.length ? chars[chars.length - 1] : "";

            updateProgress();
            saveState();

            if (event.target.value) {
              moveInActiveWord(row, col, 1);
            }
          });

          input.addEventListener("keydown", event => {
            if (event.key === "Backspace" && !event.target.value) {
              moveInActiveWord(row, col, -1);
            }
          });

          cell.appendChild(input);
          els.board.appendChild(cell);
        }
      }
    }

    function init() {
      els.pageTitle.textContent = PUZZLE.title;
      document.title = PUZZLE.title;

      state.grid = buildGrid();
      renderBoard();
      renderClues();
      loadState();
      updateTimerText();
      updateProgress();

      const defaultWordId =
        state.activeWordId ||
        PUZZLE.words.find(word => word.dir === "across")?.id ||
        PUZZLE.words[0]?.id;

      if (defaultWordId) {
        selectWord(defaultWordId);
      }

      if (state.submitted) {
        setInputsDisabled(true);
        gradePuzzle();
        stopTimer();
      } else {
        setInputsDisabled(false);
        startTimer();
      }

      els.submitBtn.addEventListener("click", () => {
        if (state.submitted) return;
        state.submitted = true;
        stopTimer();
        gradePuzzle();
        setInputsDisabled(true);
        updateProgress();
        saveState();
      });

      els.resetBtn.addEventListener("click", () => {
        const ok = window.confirm("모든 입력 기록과 타이머를 초기화할까요?");
        if (!ok) return;
        resetPuzzle();
      });

      window.addEventListener("beforeunload", saveState);
    }

    try {
      init();
    } catch (error) {
      console.error(error);
      document.body.innerHTML = `
        <div style="padding:24px;font-family:Pretendard,sans-serif;">
          <h1 style="color:#e7458c;">퍼즐 데이터를 확인해 주세요.</h1>
          <p>${String(error.message || error)}</p>
          <p>단어가 서로 겹치는 칸의 글자가 다르거나, row/col 값이 퍼즐 크기를 벗어난 경우 이런 오류가 납니다.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
