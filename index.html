<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>장애공감 가로세로퀴즈</title>
  <style>
    @font-face { font-family: 'CookieRun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/CookieRun-Regular.woff') format('woff'); font-weight: 400; font-style: normal; }
    :root {
      --bg-top: #FFFDE4; --bg-bottom: #E4FFEE; --main-color: #38C9A3; --main-color-dark: #2AA383;
      --accent-color: #FFC045; --text-dark: #2D3748; --shadow: 0 4px 12px rgba(0,0,0,0.1); --cell-gap: 2px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'CookieRun', sans-serif; background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom)); color: var(--text-dark); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    
    .app { flex: 1; display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; width: 100%; padding: 10px; min-height: 0; }
    
    .top-header { text-align: center; margin-bottom: 8px; flex-shrink: 0; }
    .top-header h1 { margin: 5px 0; font-size: 1.5rem; color: var(--main-color-dark); }
    
    .top-row { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 8px; }
    .progress-shell { background: #fff; border-radius: 20px; padding: 6px 12px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px; flex: 1; border: 1px solid #E2E8F0; }
    .progress-track { flex: 1; height: 8px; background: #EDF2F7; border-radius: 999px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: var(--main-color); transition: width 0.3s ease; }
    .timer-pill { background: #fff; padding: 6px 12px; border-radius: 20px; box-shadow: var(--shadow); font-weight: 700; color: var(--accent-color); font-size: 0.9rem; }

    .layout { display: flex; gap: 12px; flex: 1; min-height: 0; }
    
    /* 퀴즈판 영역 */
    .board-panel { flex: 1.5; background: #E6FFFA; border-radius: 15px; padding: 10px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
    .board-wrap { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    .board { display: grid; gap: var(--cell-gap); width: 100%; max-width: 500px; aspect-ratio: 1/1; }
    
    /* 칸 디자인 */
    .cell { background: #fff; border: 1px solid #CBD5E0; border-radius: 3px; position: relative; }
    .cell input { width: 100%; height: 100%; border: none; outline: none; text-align: center; font-size: 1.2rem; font-family: 'CookieRun'; font-weight: 700; color: #1A202C; background: transparent; padding: 0; }
    .cell-number { position: absolute; top: 0px; left: 1px; font-size: 0.6rem; color: var(--main-color-dark); z-index: 2; }
    .block { visibility: hidden; }
    
    .cell.active-cell { border: 2px solid var(--accent-color); z-index: 5; background: #FFFBEB; }
    .cell.highlight { background: #FFFFAF; }
    .cell.correct input { color: var(--main-color-dark); background: #D1FAE5; }
    
    /* 문제 리스트 영역 */
    .sidebar { flex: 1; background: #fff; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); }
    .sidebar-header { background: var(--main-color); color: #fff; padding: 10px; font-weight: 700; text-align: center; }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
    
    .clue-card { border: 1px solid #EDF2F7; border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
    .clue-card.active-clue { border-color: var(--accent-color); background: #FFFBEB; }
    .clue-header { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .badge { padding: 2px 6px; border-radius: 4px; color: #fff; font-size: 0.7rem; font-weight: 700; }
    .badge.across { background: var(--accent-color); }
    .badge.down { background: #63B3ED; }
    .chosung-pill { background: #F1F5F9; color: #4A5568; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; }
    .clue-desc { font-size: 0.85rem; line-height: 1.4; }

    /* 하단 버튼 */
    .footer-btns { padding: 10px; background: #F8FAFC; display: flex; gap: 8px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; color: #fff; font-family: 'CookieRun'; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    #submitBtn { background: var(--main-color); }
    #resetBtn { background: #A0AEC0; }

    /* 모바일용 레이아웃 변경 (세로로 길게) */
    @media (max-width: 768px) {
      .layout { flex-direction: column; overflow: hidden; }
      .board-panel { flex: none; height: 40dvh; }
      .sidebar { flex: 1; }
      .top-header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-header">
      <h1>⭐ 장애공감 낱말퀴즈 ⭐</h1>
      <div class="top-row">
        <div class="progress-shell">
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
          <div id="solvedCountText" style="font-size:0.8rem; font-weight:700; color:var(--main-color-dark); white-space:nowrap;">0 / 16</div>
        </div>
        <div class="timer-pill">⏰ <span id="timer">00:00</span></div>
      </div>
    </header>

    <main class="layout">
      <section class="board-panel">
        <div class="board-wrap"><div id="board" class="board"></div></div>
      </section>

      <aside class="sidebar">
        <div class="sidebar-header">💡 지혜의 열쇠</div>
        <div class="sidebar-body" id="clueContainer">
          <div id="acrossList"></div>
          <div id="downList"></div>
        </div>
        <div class="footer-btns">
          <button id="submitBtn" class="btn">제출</button>
          <button id="resetBtn" class="btn">초기화</button>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const PUZZLE = {
      size: 15,
      words: [
        { id: "a1", no: 1, dir: "across", row: 2, col: 1, answer: "장애인차별금지법", chosung: "ㅈㅇㅇㅊㅂㄱㅈㅂ", hint: "장애를 이유로 차별하는 것을 금지하는 법률." },
        { id: "d2", no: 2, dir: "down", row: 0, col: 1, answer: "지체장애", chosung: "ㅈㅊㅈㅇ", hint: "신체의 기능에 장애가 있는 상태." },
        { id: "a3", no: 3, dir: "across", row: 12, col: 6, answer: "유니버설디자인", chosung: "ㅇㄴㅂㅅㄷㅈㅇ", hint: "누구나 편리하게 이용하도록 설계하는 것." },
        { id: "a4", no: 4, dir: "across", row: 5, col: 1, answer: "배리어프리", chosung: "ㅂㄹㅇㅍㄹ", hint: "장애인의 생활에 불편을 주는 장벽을 허무는 운동." },
        { id: "d5", no: 5, dir: "down", row: 4, col: 2, answer: "물리치료", chosung: "ㅁㄹㅊㄹ", hint: "재활을 위해 신체 기능을 회복시키는 치료." },
        { id: "d6", no: 6, dir: "down", row: 0, col: 11, answer: "의사소통", chosung: "ㅇㅅㅅㅌ", hint: "생각이나 감정을 주고받는 일. (수어, 점자 등)" },
        { id: "a7", no: 7, dir: "across", row: 1, col: 10, answer: "경사로", chosung: "ㄱㅅㄹ", hint: "휠체어 등이 계단 대신 이용하는 비탈길." },
        { id: "a8", no: 8, dir: "across", row: 10, col: 1, answer: "보조공학", chosung: "ㅂㅈㄱㅎ", hint: "장애인의 일상을 돕는 기기와 기술 분야." },
        { id: "d9", no: 9, dir: "down", row: 10, col: 4, answer: "학습권", chosung: "ㅎㅅㄱ", hint: "누구나 교육을 받을 소중한 권리." },
        { id: "d10", no: 10, dir: "down", row: 2, col: 3, answer: "인권", chosung: "ㅇㄱ", hint: "사람이라면 누구나 가지는 기본적인 권리." },
        { id: "a11", no: 11, dir: "across", row: 0, col: 5, answer: "안내견", chosung: "ㅇㄴㄱ", hint: "시각장애인의 보행을 돕는 훈련된 개." },
        { id: "d12", no: 12, dir: "down", row: 6, col: 8, answer: "지적장애", chosung: "ㅈㅈㅈㅇ", hint: "지적 능력이 지체되어 도움이 필요한 장애." },
        { id: "a13", no: 13, dir: "across", row: 8, col: 6, answer: "발달장애", chosung: "ㅂㄷㅈㅇ", hint: "지적장애와 자폐성장애를 통칭하는 말." },
        { id: "d14", no: 14, dir: "down", row: 11, col: 11, answer: "점자", chosung: "ㅈㅈ", hint: "시각장애인이 손끝으로 읽는 볼록한 문자." },
        { id: "a15", no: 15, dir: "across", row: 14, col: 1, answer: "수어", chosung: "ㅅㅇ", hint: "손의 움직임과 표정으로 대화하는 언어." },
        { id: "a16", no: 16, dir: "across", row: 3, col: 11, answer: "통합교육", chosung: "ㅌㅎㄱㅇ", hint: "장애학생과 비장애학생이 함께 교육받는 것." }
      ]
    };

    let state = { elapsedSec: 0, timerId: null, grid: new Map() };

    function init() {
      state.grid.clear();
      PUZZLE.words.forEach(w => {
        w.answer.split('').forEach((char, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          const key = `${r}-${c}`;
          if (!state.grid.has(key)) state.grid.set(key, { char, wordIds: [], startNo: null });
          state.grid.get(key).wordIds.push(w.id);
          if (i === 0) state.grid.get(key).startNo = w.no;
        });
      });
      renderBoard();
      renderClues();
      startTimer();
    }

    function renderBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${PUZZLE.size}, 1fr)`;
      for (let r = 0; r < PUZZLE.size; r++) {
        for (let c = 0; c < PUZZLE.size; c++) {
          const data = state.grid.get(`${r}-${c}`);
          const cell = document.createElement("div");
          cell.className = data ? "cell" : "cell block";
          if (data) {
            if (data.startNo) {
              const span = document.createElement("span");
              span.className = "cell-number";
              span.textContent = data.startNo;
              cell.appendChild(span);
            }
            const input = document.createElement("input");
            input.maxLength = 1;
            input.id = `input-${r}-${c}`;
            input.onfocus = () => highlightWord(data.wordIds[0], r, c);
            input.oninput = (e) => {
                updateProgress();
                if(e.target.value) moveNext(r, c, data.wordIds[0]);
            };
            cell.appendChild(input);
          }
          board.appendChild(cell);
        }
      }
    }

    function renderClues() {
      const aList = document.getElementById("acrossList");
      const dList = document.getElementById("downList");
      aList.innerHTML = '<div style="font-size:0.9rem; font-weight:700; margin-bottom:10px; color:var(--main-color-dark);">[가로 문제]</div>';
      dList.innerHTML = '<div style="font-size:0.9rem; font-weight:700; margin-top:15px; margin-bottom:10px; color:var(--main-color-dark);">[세로 문제]</div>';
      
      PUZZLE.words.forEach(w => {
        const card = document.createElement("div");
        card.className = "clue-card";
        card.id = `clue-${w.id}`;
        card.innerHTML = `
          <div class="clue-header">
            <span class="badge ${w.dir}">${w.no}</span>
            <span class="chosung-pill">${w.chosung}</span>
          </div>
          <div class="clue-desc">${w.hint}</div>
        `;
        card.onclick = () => {
          const input = document.getElementById(`input-${w.row}-${w.col}`);
          if(input) input.focus();
        };
        (w.dir === "across" ? aList : dList).appendChild(card);
      });
    }

    function highlightWord(wordId, curR, curC) {
      const word = PUZZLE.words.find(w => w.id === wordId);
      document.querySelectorAll('.cell').forEach(el => el.classList.remove('active-cell', 'highlight'));
      document.querySelectorAll('.clue-card').forEach(el => el.classList.remove('active-clue'));
      
      const activeClue = document.getElementById(`clue-${wordId}`);
      if(activeClue) activeClue.classList.add('active-clue');

      word.answer.split('').forEach((_, i) => {
        const r = word.row + (word.dir === "down" ? i : 0);
        const c = word.col + (word.dir === "across" ? i : 0);
        const cell = document.getElementById(`input-${r}-${c}`).parentElement;
        cell.classList.add('highlight');
        if(r === curR && c === curC) cell.classList.add('active-cell');
      });
    }

    function moveNext(r, c, wordId) {
      const word = PUZZLE.words.find(w => w.id === wordId);
      let nextR = r, nextC = c;
      if(word.dir === "across") nextC++; else nextR++;
      const nextInput = document.getElementById(`input-${nextR}-${nextC}`);
      if(nextInput) nextInput.focus();
    }

    function updateProgress() {
      let solved = 0;
      PUZZLE.words.forEach(w => {
        const user = w.answer.split('').map((_, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          return document.getElementById(`input-${r}-${c}`).value;
        }).join('');
        if (user === w.answer) solved++;
      });
      document.getElementById("solvedCountText").textContent = `${solved} / 16`;
      document.getElementById("progressFill").style.width = `${(solved/16)*100}%`;
    }

    function startTimer() {
      state.timerId = setInterval(() => {
        state.elapsedSec++;
        const m = String(Math.floor(state.elapsedSec / 60)).padStart(2, '0');
        const s = String(state.elapsedSec % 60).padStart(2, '0');
        document.getElementById("timer").textContent = `${m}:${s}`;
      }, 1000);
    }

    document.getElementById("submitBtn").onclick = () => {
      let correct = 0;
      PUZZLE.words.forEach(w => {
        const user = w.answer.split('').map((_, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          return document.getElementById(`input-${r}-${c}`).value;
        }).join('');
        if(user === w.answer) correct++;
      });
      alert(`수고하셨습니다!\n정답: ${correct} / 16\n시간: ${document.getElementById("timer").textContent}`);
    };

    document.getElementById("resetBtn").onclick = () => {
      if(confirm("다시 시작할까요?")) location.reload();
    };

    init();
  </script>
</body>
</html>
