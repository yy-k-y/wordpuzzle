<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>장애공감 가로세로퀴즈</title>
  <style>
    @font-face { font-family: 'CookieRun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/CookieRun-Regular.woff') format('woff'); font-weight: 400; font-style: normal; }
    :root {
      --bg-top: #FFFDE4; --bg-bottom: #E4FFEE; --main-color: #38C9A3; --main-color-dark: #2AA383;
      --accent-color: #FFC045; --text-dark: #2D3748; --shadow: 0 8px 24px rgba(56, 201, 163, 0.15); --cell-gap: 4px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'CookieRun', sans-serif; background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom)); color: var(--text-dark); overflow: hidden; }
    .app { max-width: 1200px; margin: 0 auto; padding: 16px; height: 100dvh; display: flex; flex-direction: column; }
    .top-header { text-align: center; margin-bottom: 12px; flex-shrink: 0; }
    .top-header h1 { margin: 0 0 12px; font-size: clamp(20px, 4vw, 32px); color: var(--main-color-dark); text-shadow: 2px 2px 0px #fff; }
    .top-row { display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 10px; }
    .progress-shell { background: #fff; border-radius: 30px; padding: 8px 16px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; flex: 1; max-width: 300px; border: 2px solid #E2E8F0; }
    .progress-track { flex: 1; height: 10px; background: #EDF2F7; border-radius: 999px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: var(--main-color); transition: width 0.4s ease; }
    .timer-pill { background: #fff; padding: 8px 16px; border-radius: 30px; box-shadow: var(--shadow); font-weight: 700; color: var(--accent-color); border: 2px solid #E2E8F0; }
    
    .guide-box { background: #fff; border: 2px dashed var(--main-color); border-radius: 12px; padding: 8px 12px; margin-bottom: 10px; text-align: center; font-size: 14px; color: var(--main-color-dark); }

    .layout { display: flex; gap: 16px; flex: 1; min-height: 0; }
    .panel { border-radius: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; background: #fff; border: 2px solid #fff; }
    .board-panel { flex: 1.2; background-color: #E6FFFA; padding: 15px; min-height: 0; }
    .board-wrap { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .board { display: grid; width: 100%; height: 100%; max-width: 580px; max-height: 580px; aspect-ratio: 1 / 1; gap: var(--cell-gap); }
    .cell { width: 100%; height: 100%; border: 1.5px solid #A0AEC0; border-radius: 4px; background: #fff; position: relative; transition: all 0.2s; }
    .cell input { width: 100%; height: 100%; border: none; outline: none; text-align: center; background: transparent; font-size: clamp(12px, 2.5vmin, 20px); font-family: 'CookieRun'; font-weight: 700; color: #1A202C; padding: 0; }
    .cell-number { position: absolute; top: 1px; left: 2px; font-size: 9px; font-weight: 700; color: var(--main-color-dark); pointer-events: none; }
    .block { visibility: hidden; }
    
    .cell.active-cell { border: 2.5px solid var(--accent-color); z-index: 5; transform: scale(1.05); box-shadow: 0 0 10px rgba(255,192,69,0.5); }
    .cell.highlight { background: #FFFFAF; }
    .cell.correct input { background: #D1FAE5; color: var(--main-color-dark); }
    .cell.wrong input { background: #FFF5F5; color: #E53E3E; }
    
    .sidebar { width: 360px; flex-shrink: 0; }
    .sidebar-header { background: var(--main-color); color: #fff; padding: 12px; font-weight: 700; text-align: center; font-size: 18px; }
    .sidebar-body { padding: 15px; overflow-y: auto; flex: 1; }
    .clue-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .clue-title { font-size: 15px; color: var(--main-color-dark); border-bottom: 2px dashed #E2E8F0; padding-bottom: 5px; margin-bottom: 10px; }
    .clue-card { border: 1.5px solid #EDF2F7; border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.2s; font-size: 13.5px; line-height: 1.4; background: #fff; }
    .clue-card.active-clue { border-color: var(--accent-color); background: #FFFFAF; box-shadow: 0 4px 8px rgba(255,192,69,0.2); }
    
    .badge { padding: 2px 6px; border-radius: 5px; color: #fff; font-size: 11px; margin-right: 5px; font-weight: 700; }
    .badge.across { background: var(--accent-color); }
    .badge.down { background: #63B3ED; }
    
    .action-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; color: #fff; font-family: 'CookieRun'; font-weight: 700; cursor: pointer; font-size: 15px; margin-bottom: 8px; box-shadow: 0 4px 0 rgba(0,0,0,0.1); transition: all 0.1s; }
    .action-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
    #submitBtn { background: var(--main-color); }
    #resetBtn { background: #A0AEC0; }
    
    @media (max-width: 900px) { .layout { flex-direction: column; } .sidebar { width: 100%; flex: 1; min-height: 0; } .board-panel { height: 45vh; flex: none; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-header">
      <h1>⭐ 장애공감 낱말퀴즈 ⭐</h1>
      <div class="top-row">
        <div class="progress-shell">
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
          <div id="solvedCountText" style="font-size:13px; font-weight:700; color:var(--main-color-dark); white-space:nowrap;">0 / 15</div>
        </div>
        <div class="timer-pill">⏰ <span id="timer">00:00</span></div>
      </div>
    </header>

    <div class="guide-box">
      💡 <b>Tab 키</b>로 이동하거나 칸을 <b>클릭</b>해 입력하세요! <b>[초기화]</b>로 다시 풀 수 있어요.
    </div>

    <main class="layout">
      <section class="panel board-panel">
        <div class="board-wrap"><div id="board" class="board"></div></div>
      </section>

      <aside class="panel sidebar">
        <div class="sidebar-header">💡 지혜의 열쇠</div>
        <div class="sidebar-body">
          <div class="clue-title">👉 가로 문제</div>
          <div id="acrossList" class="clue-list"></div>
          <div class="clue-title">👇 세로 문제</div>
          <div id="downList" class="clue-list"></div>
        </div>
        <div style="padding:15px; background:#F7FAFC; border-top:1px solid #E2E8F0;">
          <button id="submitBtn" class="action-btn">다 풀었어요! 제출하기</button>
          <button id="resetBtn" class="action-btn">처음부터 다시 풀기</button>
          <div id="resultBox" style="display:none; text-align:center; margin-top:10px; padding:10px; background:#E6FFFA; border-radius:10px; border:2px dashed var(--main-color); font-size:14px;"></div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const PUZZLE = {
      size: 13, // 레이아웃 공간 확보를 위해 사이즈 소폭 확장
      words: [
        { id: "a1", no: 1, dir: "across", row: 2, col: 1, answer: "장애인차별금지법", hint: "장애를 이유로 차별하는 것을 금지하는 법률." },
        { id: "d2", no: 2, dir: "down", row: 1, col: 1, answer: "지체장애", hint: "신체의 기능에 장애가 있는 상태." },
        { id: "d3", no: 3, dir: "down", row: 0, col: 5, answer: "유니버설디자인", hint: "누구나 편리하게 이용하도록 설계하는 것." },
        { id: "a4", no: 4, dir: "across", row: 5, col: 4, answer: "배리어프리", hint: "장애인의 생활에 불편을 주는 장벽을 허무는 운동." },
        { id: "d5", no: 5, dir: "down", row: 4, col: 8, answer: "물리치료", hint: "재활을 위해 신체 기능을 회복시키는 치료." },
        { id: "d6", no: 6, dir: "down", row: 1, col: 11, answer: "의사소통", hint: "생각이나 감정을 주고받는 일. (수어, 점자 등)" },
        { id: "a7", no: 7, dir: "across", row: 0, col: 9, answer: "경사로", hint: "휠체어 등이 계단 대신 이용하는 비탈길." },
        { id: "a8", no: 8, dir: "across", row: 8, col: 1, answer: "보조공학", hint: "장애인의 일상을 돕는 기기와 기술 분야." },
        { id: "d9", no: 9, dir: "down", row: 7, col: 2, answer: "학습권", hint: "누구나 교육을 받을 소중한 권리." },
        { id: "a10", no: 10, dir: "across", row: 10, col: 1, answer: "인권", hint: "사람이라면 누구나 가지는 기본적인 권리." },
        { id: "a11", no: 11, dir: "across", row: 4, col: 10, answer: "안내견", hint: "시각장애인의 보행을 돕는 훈련된 개." },
        // 12번 지적장애를 아래쪽으로 이동시켜 3번과 분리
        { id: "d12", no: 12, dir: "down", row: 8, col: 6, answer: "지적장애", hint: "지적 능력이 지체되어 도움이 필요한 장애.)" },
        { id: "a13", no: 13, dir: "across", row: 9, col: 4, answer: "발달장애", hint: "지적장애와 자폐성장애를 통칭하는 말." },
        { id: "d14", no: 14, dir: "down", row: 9, col: 10, answer: "점자", hint: "시각장애인이 손끝으로 읽는 볼록한 문자." },
        { id: "a15", no: 15, dir: "across", row: 11, col: 9, answer: "수어", hint: "손의 움직임과 표정으로 대화하는 언어." }
      ]
    };

    let state = { elapsedSec: 0, timerId: null, grid: new Map() };

    function init() {
      state.grid.clear();
      for (const w of PUZZLE.words) {
        w.answer.split('').forEach((char, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          const key = `${r}-${c}`;
          if (!state.grid.has(key)) state.grid.set(key, { char, wordIds: [], startNo: null });
          state.grid.get(key).wordIds.push(w.id);
          if (i === 0) state.grid.get(key).startNo = w.no;
        });
      }
      renderBoard();
      renderClues();
      startTimer();
    }

    function renderBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${PUZZLE.size}, 1fr)`;
      for (let r = 0; r < PUZZLE.size; r++) {
        for (let c = 0; c < PUZZLE.size; c++) {
          const data = state.grid.get(`${r}-${c}`);
          const cell = document.createElement("div");
          cell.className = data ? "cell" : "cell block";
          cell.id = `cell-${r}-${c}`;
          if (data) {
            if (data.startNo) {
              const span = document.createElement("span");
              span.className = "cell-number";
              span.textContent = data.startNo;
              cell.appendChild(span);
            }
            const input = document.createElement("input");
            input.maxLength = 1;
            input.dataset.r = r; input.dataset.c = c;
            input.onfocus = () => highlightWord(data.wordIds[0]);
            input.oninput = () => updateProgress();
            cell.appendChild(input);
          }
          board.appendChild(cell);
        }
      }
    }

    function renderClues() {
      document.getElementById("acrossList").innerHTML = "";
      document.getElementById("downList").innerHTML = "";
      PUZZLE.words.forEach(w => {
        const card = document.createElement("div");
        card.className = "clue-card";
        card.id = `clue-${w.id}`;
        card.innerHTML = `<span class="badge ${w.dir}">${w.no}</span> ${w.hint}`;
        card.onclick = () => {
          highlightWord(w.id);
          const targetInput = document.querySelector(`input[data-r="${w.row}"][data-c="${w.col}"]`);
          if(targetInput) targetInput.focus();
        };
        document.getElementById(w.dir === "across" ? "acrossList" : "downList").appendChild(card);
      });
    }

    function highlightWord(wordId) {
      const word = PUZZLE.words.find(w => w.id === wordId);
      if(!word) return;
      document.querySelectorAll('.cell').forEach(el => el.classList.remove('active-cell', 'highlight'));
      document.querySelectorAll('.clue-card').forEach(el => el.classList.remove('active-clue'));
      const activeClue = document.getElementById(`clue-${wordId}`);
      if(activeClue) {
          activeClue.classList.add('active-clue');
          activeClue.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      word.answer.split('').forEach((_, i) => {
        const r = word.row + (word.dir === "down" ? i : 0);
        const c = word.col + (word.dir === "across" ? i : 0);
        const cellEl = document.getElementById(`cell-${r}-${c}`);
        if(cellEl) {
            cellEl.classList.add('highlight');
            if(i === 0) cellEl.classList.add('active-cell');
        }
      });
    }

    function updateProgress() {
      let solved = 0;
      PUZZLE.words.forEach(w => {
        const userAns = w.answer.split('').map((_, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          const input = document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
          return input ? input.value : "";
        }).join('');
        if (userAns === w.answer) solved++;
      });
      document.getElementById("solvedCountText").textContent = `${solved} / 15`;
      document.getElementById("progressFill").style.width = `${(solved / 15) * 100}%`;
    }

    function startTimer() {
      if(state.timerId) clearInterval(state.timerId);
      state.timerId = setInterval(() => {
        state.elapsedSec++;
        const m = String(Math.floor(state.elapsedSec / 60)).padStart(2, '0');
        const s = String(state.elapsedSec % 60).padStart(2, '0');
        document.getElementById("timer").textContent = `${m}:${s}`;
      }, 1000);
    }

    document.getElementById("submitBtn").onclick = () => {
      clearInterval(state.timerId);
      let correct = 0;
      PUZZLE.words.forEach(w => {
        const userAns = w.answer.split('').map((_, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          return document.querySelector(`input[data-r="${r}"][data-c="${c}"]`).value;
        }).join('');
        const isCorrect = userAns === w.answer;
        if (isCorrect) correct++;
        w.answer.split('').forEach((_, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          const cell = document.getElementById(`cell-${r}-${c}`);
          cell.classList.remove('correct', 'wrong');
          cell.classList.add(isCorrect ? "correct" : "wrong");
        });
      });
      const res = document.getElementById("resultBox");
      res.style.display = "block";
      res.innerHTML = `<strong>결과: ${correct} / 15 정답!</strong><br>소요시간: ${document.getElementById("timer").textContent}`;
    };

    document.getElementById("resetBtn").onclick = () => {
      if(!confirm("정말 처음부터 다시 풀까요?")) return;
      document.querySelectorAll('.cell input').forEach(input => input.value = "");
      document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('correct', 'wrong', 'active-cell', 'highlight'));
      document.querySelectorAll('.clue-card').forEach(card => card.classList.remove('active-clue'));
      state.elapsedSec = 0;
      document.getElementById("timer").textContent = "00:00";
      document.getElementById("resultBox").style.display = "none";
      updateProgress();
      startTimer();
    };

    init();
  </script>
</body>
</html>
