<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장애공감 가로세로퀴즈</title>
  <style>
    :root {
      --bg1: #fffefe;
      --bg2: #fff7fb;
      --pink: #f04f98;
      --text: #2f3550;
      --muted: #7f8398;
      --shadow: 0 12px 32px rgba(210, 181, 196, 0.18);
      --cell-size: 48px;
      --cell-gap: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      overflow-y: hidden; /* 전체 페이지 스크롤 방지 */
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-header { text-align: center; margin-bottom: 24px; flex-shrink: 0; }
    .top-header h1 {
      margin: 0 0 16px;
      font-size: clamp(28px, 4vw, 50px);
      font-weight: 900;
      color: var(--pink);
      letter-spacing: -0.03em;
    }

    .top-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .progress-shell {
      min-width: 280px;
      max-width: 500px;
      background: #fff;
      border-radius: 999px;
      padding: 12px 20px;
      box-shadow: 0 6px 18px rgba(218, 183, 198, 0.28);
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    .progress-track {
      flex: 1;
      height: 12px;
      background: #fdeaf2;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff82af, #f04f98);
      transition: width 0.3s ease;
    }

    .progress-text { font-weight: 800; color: #5c4450; white-space: nowrap; font-size: 15px;}

    .timer-pill {
      background: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(218, 183, 198, 0.28);
      font-weight: 900;
      color: #5c4450;
      font-size: 17px;
    }

    /* 레이아웃 개선 */
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 400px;
      gap: 24px;
      flex: 1;
      min-height: 0; /* 스크롤을 위해 필수 */
    }

    .panel {
      background: #fff;
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .board-panel {
      padding: 24px;
      align-items: center;
    }

    .board-top-note {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.5;
    }

    .board-wrap {
      overflow: auto;
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px;
    }

    .board {
      display: grid;
      gap: var(--cell-gap);
      width: max-content;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: 2px solid #f9d5e1;
      border-radius: 12px;
      background: #fff;
      position: relative;
    }

    .cell input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      border-radius: 10px;
      text-align: center;
      background: transparent;
      font-size: 22px;
      font-weight: 800;
      color: #444;
      padding: 0;
    }

    .cell-number {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 11px;
      font-weight: 900;
      color: #ff5b8f;
      pointer-events: none;
    }

    .block { visibility: hidden; border: none; }

    .cell.active { border-color: #ff5e97; box-shadow: 0 0 0 3px rgba(240, 79, 152, .15); }
    .cell.correct input { background: #e9fff0; color: #137a43; }
    .cell.wrong input { background: #fff1f6; color: #b83063; }

    .sidebar-header {
      background: linear-gradient(90deg, #ff759f, #ee5b97);
      color: #fff;
      padding: 20px;
      font-size: 20px;
      font-weight: 900;
      text-align: center;
      flex-shrink: 0;
    }

    /* 사이드바 스크롤 영역 설정 */
    .sidebar-body { 
      padding: 20px; 
      overflow-y: auto; /* 세로 스크롤 활성화 */
      flex: 1;
    }

    .section-title { margin: 0 0 12px; font-size: 18px; color: #5b4450; }
    .clue-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .clue-card {
      border: 1px solid #f7edf2;
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 12px rgba(180, 183, 201, .1);
      cursor: pointer;
    }

    .clue-card.active { border-color: #ff8ab5; box-shadow: 0 0 0 2px rgba(240, 79, 152, .1); }
    .clue-card.correct { background: #f0fff5; border-color: #bfeacc; }
    .clue-card.wrong { background: #fff7f9; border-color: #ffd2df; }

    .clue-head { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .badge {
      min-width: 32px; height: 32px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 900; font-size: 14px;
    }
    .badge.across { background: #ff4d7e; }
    .badge.down { background: #40b7f5; }

    .chip { padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: 800; margin-right: 4px;}
    .chip.initial { background: #f8f1ff; color: #7950c8; }
    
    .clue-text { margin: 0; line-height: 1.5; color: var(--text); font-size: 15px; }

    .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .action-btn {
      border: none; border-radius: 14px; padding: 16px;
      font-size: 18px; font-weight: 900; cursor: pointer; color: #fff;
    }
    .submit-btn { background: linear-gradient(90deg, #ff709d, #ee5b97); }
    .reset-btn { background: #71626a; }

    .result-box { margin-top: 16px; padding: 16px; font-weight: 800; color: #5b4450; background: #fdf5f8; border-radius: 12px; display: none; line-height: 1.6;}

    @media (max-width: 1024px) {
      body { overflow-y: auto; }
      .app { height: auto; }
      .layout { grid-template-columns: 1fr; display: flex; flex-direction: column;}
      .board-panel { min-height: 500px; }
      .sidebar { max-height: 800px; }
      :root { --cell-size: 40px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-header">
      <h1>장애공감 가로세로퀴즈</h1>
      <div class="top-row">
        <div class="progress-shell">
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
          <div class="progress-text"><span id="solvedCount">0</span> / <span id="totalCount">0</span> 완성!</div>
        </div>
        <div class="timer-pill">⏱ <span id="timer">00:00</span></div>
      </div>
    </header>

    <main class="layout">
      <section class="panel board-panel">
        <div class="board-top-note">
          마우스나 <strong>키보드 방향키(⬅️ ⬆️ ⬇️ ➡️)</strong>를 이용해 칸을 이동하며 입력하세요.<br>
          힌트를 클릭하면 단어 위치가 표시됩니다.
        </div>
        <div class="board-wrap"><div id="board" class="board"></div></div>
      </section>

      <aside class="panel sidebar">
        <div class="sidebar-header">📖 지혜의 열쇠</div>
        <div class="sidebar-body">
          <h2 class="section-title">가로</h2>
          <div id="acrossList" class="clue-list"></div>

          <h2 class="section-title">세로</h2>
          <div id="downList" class="clue-list"></div>

          <div class="actions">
            <button id="submitBtn" class="action-btn submit-btn">제출하기</button>
            <button id="resetBtn" class="action-btn reset-btn">모든 기록 초기화</button>
          </div>
          <div id="resultBox" class="result-box"></div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const PUZZLE = {
      size: 14,
      words: [
        { id: "a1", no: 1, dir: "across", row: 0, col: 0, answer: "배리어프리", hint: "장애인과 비장애인 모두가 불편 없이 이용할 수 있도록 장벽을 없애려는 개념." },
        { id: "d1", no: 1, dir: "down", row: 0, col: 0, answer: "배려", hint: "다른 사람을 존중하고 도와주려는 마음." },
        { id: "a3", no: 3, dir: "across", row: 2, col: 4, answer: "보조기기", hint: "장애인의 이동, 의사소통, 생활을 돕는 각종 장치." },
        { id: "a5", no: 5, dir: "across", row: 0, col: 9, answer: "점자", hint: "시각장애인이 손끝으로 읽을 수 있도록 만든 문자." },
        { id: "d6", no: 6, dir: "down", row: 0, col: 10, answer: "자립", hint: "도움을 받더라도 삶을 스스로 꾸려 나가는 것." },
        { id: "d4", no: 4, dir: "down", row: 0, col: 12, answer: "리프트", hint: "휠체어 이용자가 층을 오르내릴 때 도움을 주는 장치." },
        { id: "d12", no: 12, dir: "down", row: 4, col: 10, answer: "이동권", hint: "누구나 안전하고 자유롭게 이동할 권리." },
        { id: "a7", no: 7, dir: "across", row: 6, col: 0, answer: "경사로", hint: "휠체어나 유모차가 계단 대신 이동할 수 있도록 만든 비탈길." },
        { id: "d8", no: 8, dir: "down", row: 6, col: 1, answer: "사회", hint: "서로 다른 사람들이 함께 살아가는 공동체." },
        { id: "a9", no: 9, dir: "across", row: 8, col: 5, answer: "인권", hint: "사람이라면 누구나 당연히 누려야 하는 기본적인 권리." },
        { id: "d9", no: 9, dir: "down", row: 8, col: 5, answer: "인식", hint: "대상을 이해하고 받아들이는 생각이나 태도." },
        { id: "a11", no: 11, dir: "across", row: 10, col: 3, answer: "포용", hint: "다름을 배척하지 않고 넓게 품는 태도." },
        { id: "d14", no: 14, dir: "down", row: 9, col: 12, answer: "공감", hint: "다른 사람의 생각이나 감정을 함께 느끼고 이해하는 것." },
        { id: "a13", no: 13, dir: "across", row: 12, col: 0, answer: "존중", hint: "상대의 존재와 권리를 소중히 여기는 태도." },
        { id: "a15", no: 15, dir: "across", row: 12, col: 8, answer: "수어", hint: "손동작, 표정, 몸짓으로 의미를 전달하는 언어." }
      ]
    };

    let state = { elapsedSec: 0, timerId: null, submitted: false, activeWordId: null, grid: new Map() };
    const wordsById = new Map(PUZZLE.words.map(w => [w.id, w]));

    function splitChars(text) { return Array.from(text.replace(/\s+/g, "").trim()); }
    function getWordCells(word) {
      return splitChars(word.answer).map((char, i) => ({
        row: word.row + (word.dir === "down" ? i : 0),
        col: word.col + (word.dir === "across" ? i : 0),
        char
      }));
    }
    function getInitialConsonants(text) {
      const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
      return splitChars(text).map(char => {
        const code = char.charCodeAt(0) - 44032;
        return (code >= 0 && code <= 11171) ? CHO[Math.floor(code / 588)] : char;
      }).join("");
    }
    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function buildGrid() {
      for (const word of PUZZLE.words) {
        getWordCells(word).forEach((cell, i) => {
          const key = `${cell.row}-${cell.col}`;
          if (!state.grid.has(key)) state.grid.set(key, { wordIds: [], startNos: [] });
          const gridCell = state.grid.get(key);
          if (!gridCell.wordIds.includes(word.id)) gridCell.wordIds.push(word.id);
          if (i === 0) gridCell.startNos.push(word.no);
        });
      }
    }

    function renderBoard() {
      const boardEl = document.getElementById("board");
      boardEl.style.gridTemplateColumns = `repeat(${PUZZLE.size}, var(--cell-size))`;

      for (let r = 0; r < PUZZLE.size; r++) {
        for (let c = 0; c < PUZZLE.size; c++) {
          const key = `${r}-${c}`;
          const cellData = state.grid.get(key);

          if (!cellData) {
            const block = document.createElement("div");
            block.className = "cell block";
            boardEl.appendChild(block);
            continue;
          }

          const cell = document.createElement("div");
          cell.className = "cell";
          
          if (cellData.startNos.length > 0) {
            const num = document.createElement("span");
            num.className = "cell-number";
            num.textContent = cellData.startNos[0];
            cell.appendChild(num);
          }

          const input = document.createElement("input");
          input.type = "text"; 
          input.dataset.r = r; 
          input.dataset.c = c;
          
          // 글자 입력 처리 (마지막 글자만 유지, 자동이동 제거)
          input.addEventListener("input", (e) => {
            const val = e.target.value;
            if (val.length > 0) {
              e.target.value = val.slice(-1); // 항상 마지막에 친 1글자만 남김
            }
            updateProgress();
          });

          // 방향키 및 백스페이스 이동 지원
          input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !e.target.value) {
              moveFocusInWord(r, c, -1);
            } else if (e.key === "ArrowRight") {
              e.preventDefault(); moveFocusDir(r, c, 0, 1);
            } else if (e.key === "ArrowLeft") {
              e.preventDefault(); moveFocusDir(r, c, 0, -1);
            } else if (e.key === "ArrowDown") {
              e.preventDefault(); moveFocusDir(r, c, 1, 0);
            } else if (e.key === "ArrowUp") {
              e.preventDefault(); moveFocusDir(r, c, -1, 0);
            }
          });

          input.addEventListener("focus", () => selectWord(cellData.wordIds[0]));
          
          cell.appendChild(input);
          boardEl.appendChild(cell);
        }
      }
    }

    function renderClues() {
      const render = (dir, targetId) => {
        const target = document.getElementById(targetId);
        PUZZLE.words.filter(w => w.dir === dir).sort((a,b)=>a.no-b.no).forEach(word => {
          const card = document.createElement("div");
          card.className = "clue-card"; card.dataset.id = word.id;
          card.innerHTML = `
            <div class="clue-head">
              <span class="badge ${dir}">${word.no}</span>
              <div><span class="chip initial">초성 ${getInitialConsonants(word.answer)}</span></div>
            </div>
            <p class="clue-text">${word.hint}</p>
          `;
          card.addEventListener("click", () => { selectWord(word.id); focusFirstEmpty(word.id); });
          target.appendChild(card);
        });
      };
      render("across", "acrossList"); render("down", "downList");
    }

    function getEl(r, c) { return document.querySelector(`input[data-r="${r}"][data-c="${c}"]`); }
    
    // 단어 내에서 백스페이스 시 이동
    function moveFocusInWord(r, c, step) {
      if (!state.activeWordId) return;
      const cells = getWordCells(wordsById.get(state.activeWordId));
      const idx = cells.findIndex(cell => cell.row === Number(r) && cell.col === Number(c));
      if (idx !== -1 && cells[idx + step]) getEl(cells[idx + step].row, cells[idx + step].col)?.focus();
    }

    // 방향키 절대 이동
    function moveFocusDir(r, c, dr, dc) {
      const nextEl = getEl(Number(r) + dr, Number(c) + dc);
      if (nextEl) nextEl.focus();
    }

    function selectWord(wordId) {
      state.activeWordId = wordId;
      document.querySelectorAll(".clue-card, .cell").forEach(el => el.classList.remove("active"));
      
      const card = document.querySelector(`.clue-card[data-id="${wordId}"]`);
      if (card) {
        card.classList.add("active");
        // 모바일이나 좁은 화면에서 카드가 보이도록 자동 스크롤
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      
      getWordCells(wordsById.get(wordId)).forEach(c => getEl(c.row, c.col)?.parentElement.classList.add("active"));
    }

    function focusFirstEmpty(wordId) {
      const cells = getWordCells(wordsById.get(wordId));
      for (let c of cells) {
        const el = getEl(c.row, c.col);
        if (!el.value) { el.focus(); return; }
      }
      getEl(cells[0].row, cells[0].col)?.focus();
    }

    function updateProgress() {
      let solved = 0;
      PUZZLE.words.forEach(w => {
        const ans = getWordCells(w).map(c => getEl(c.row, c.col)?.value || "").join("");
        if (ans === w.answer) solved++;
      });
      document.getElementById("totalCount").textContent = PUZZLE.words.length;
      document.getElementById("solvedCount").textContent = solved;
      document.getElementById("progressFill").style.width = `${(solved / PUZZLE.words.length) * 100}%`;
      return solved;
    }

    function startTimer() {
      state.timerId = setInterval(() => {
        state.elapsedSec++;
        document.getElementById("timer").textContent = formatTime(state.elapsedSec);
      }, 1000);
    }

    document.getElementById("submitBtn").addEventListener("click", () => {
      if (state.submitted) return;
      clearInterval(state.timerId); state.submitted = true;
      
      const resultBox = document.getElementById("resultBox");
      const solved = updateProgress();
      
      document.querySelectorAll("input").forEach(el => el.disabled = true);
      PUZZLE.words.forEach(w => {
        const ans = getWordCells(w).map(c => getEl(c.row, c.col)?.value || "").join("");
        const isCorrect = ans === w.answer;
        document.querySelector(`.clue-card[data-id="${w.id}"]`).classList.add(isCorrect ? "correct" : "wrong");
        getWordCells(w).forEach(c => {
           const cellEl = getEl(c.row, c.col).parentElement;
           if(!isCorrect) cellEl.classList.add("wrong");
           else if(!cellEl.classList.contains("wrong")) cellEl.classList.add("correct");
        });
      });
      
      resultBox.innerHTML = `채점 완료: <strong>${solved} / ${PUZZLE.words.length}</strong> 정답<br>소요 시간: <strong>${formatTime(state.elapsedSec)}</strong>`;
      resultBox.style.display = "block";
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if(confirm("모든 입력을 초기화하시겠습니까?")) location.reload();
    });

    buildGrid(); renderBoard(); renderClues(); updateProgress(); startTimer();
    selectWord("a1");
  </script>
</body>
</html>
