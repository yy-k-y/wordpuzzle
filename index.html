<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>장애공감 가로세로퀴즈</title>
  <style>
    @font-face { font-family: 'CookieRun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/CookieRun-Regular.woff') format('woff'); font-weight: 400; font-style: normal; }
    :root {
      --bg-top: #FFFDE4; --bg-bottom: #E4FFEE; --main-color: #38C9A3; --main-color-dark: #2AA383;
      --accent-color: #FFC045; --text-dark: #2D3748; --shadow: 0 4px 15px rgba(56, 201, 163, 0.1); --cell-gap: 1.5px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'CookieRun', sans-serif; background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom)); color: var(--text-dark); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    
    .app { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; height: 100%; display: flex; flex-direction: column; }
    
    .top-header { text-align: center; flex-shrink: 0; padding-bottom: 5px; }
    .top-header h1 { margin: 2px 0 3px; font-size: clamp(16px, 4vw, 26px); color: var(--main-color-dark); }
    
    .top-row { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 2px; }
    .progress-shell { background: #fff; border-radius: 20px; padding: 3px 10px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px; flex: 1; max-width: 200px; border: 1px solid #E2E8F0; }
    .progress-track { flex: 1; height: 6px; background: #EDF2F7; border-radius: 999px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: var(--main-color); transition: width 0.4s ease; }
    .timer-pill { background: #fff; padding: 3px 10px; border-radius: 20px; box-shadow: var(--shadow); font-weight: 700; color: var(--accent-color); border: 1px solid #E2E8F0; font-size: 12px; }

    .usage-guide { text-align: center; font-size: 11px; color: #718096; margin-bottom: 5px; font-weight: 700; }

    .layout { display: flex; gap: 12px; flex: 1; min-height: 0; }
    
    .panel { border-radius: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; background: #fff; border: 1px solid #fff; }
    .board-panel { flex: 1.3; background-color: #E6FFFA; padding: 10px; min-height: 0; display: flex; align-items: center; justify-content: center; }
    .board-wrap { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    .board { display: grid; width: 100%; height: 100%; max-width: 550px; max-height: 550px; aspect-ratio: 1 / 1; gap: var(--cell-gap); }
    
    .cell { width: 100%; height: 100%; border: 1px solid #A0AEC0; border-radius: 1px; background: #fff; position: relative; }
    .cell input { width: 100%; height: 100%; border: none; outline: none; text-align: center; background: transparent; font-size: clamp(10px, 2.5vmin, 18px); font-family: 'CookieRun'; font-weight: 700; color: #1A202C; padding: 0; }
    .cell-number { position: absolute; top: 0px; left: 1px; font-size: 7px; font-weight: 700; color: var(--main-color-dark); pointer-events: none; }
    .block { background: #EDF2F7 !important; border: none; opacity: 0.5; }
    
    .cell.active-cell { border: 2px solid var(--accent-color); z-index: 5; background: #FFFBEB; }
    .cell.highlight { background: #FFFFAF; }
    
    .sidebar { width: 300px; flex-shrink: 0; }
    .sidebar-header { background: var(--main-color); color: #fff; padding: 8px; font-weight: 700; text-align: center; font-size: 15px; }
    .sidebar-body { padding: 10px; overflow-y: auto; flex: 1; scroll-behavior: smooth; }
    .clue-title { font-size: 13px; font-weight: 700; color: var(--main-color-dark); border-bottom: 2px dashed #E2E8F0; padding-bottom: 4px; margin-bottom: 6px; }
    
    .clue-card { border: 1px solid #EDF2F7; border-radius: 6px; padding: 8px; cursor: pointer; background: #fff; margin-bottom: 6px; transition: background 0.3s; }
    .clue-card.active-clue { border-color: var(--accent-color); background: #FFFFAF; }
    .clue-header { display: flex; align-items: center; margin-bottom: 4px; gap: 5px; }
    .badge { padding: 1px 5px; border-radius: 3px; color: #fff; font-size: 9px; font-weight: 700; }
    .badge.across { background: var(--accent-color); }
    .badge.down { background: #63B3ED; }
    .chosung-pill { background: #EDF2F7; color: #4A5568; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; }
    .clue-desc { font-size: 12px; line-height: 1.3; color: #4A5568; word-break: keep-all; }
    
    .footer-btns { padding: 8px; background: #F7FAFC; border-top: 1px solid #E2E8F0; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-btn { padding: 10px; border: none; border-radius: 8px; color: #fff; font-family: 'CookieRun'; font-weight: 700; cursor: pointer; font-size: 13px; }
    #submitBtn { background: var(--main-color); grid-column: span 2; }
    #resetBtn { background: #A0AEC0; grid-column: span 2; }

    @media (max-width: 850px) {
      .app { padding: 5px; }
      .layout { flex-direction: column; overflow: hidden; }
      .board-panel { flex: none; padding: 5px; height: auto; }
      .board { width: 94vw; height: 94vw; max-width: 380px; max-height: 380px; margin: 0 auto; }
      .sidebar { width: 100%; flex: 1; min-height: 0; }
      .sidebar-body { padding: 8px; } /* 모바일에서는 1열로 힌트 정렬 */
      .footer-btns { grid-template-columns: 1fr 1fr; }
      #submitBtn, #resetBtn { grid-column: span 1; padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-header">
      <h1>⭐ 장애공감 낱말퀴즈 ⭐</h1>
      <div class="top-row">
        <div class="progress-shell">
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
          <div id="solvedCountText" style="font-size:11px; font-weight:700;">0 / 16</div>
        </div>
        <div class="timer-pill">⏰ <span id="timer">00:00</span></div>
      </div>
    </header>

    <div class="usage-guide">💡 칸을 클릭해 입력하세요! 자동으로 다음 칸으로 넘어갑니다.</div>

    <main class="layout">
      <section class="panel board-panel">
        <div class="board-wrap"><div id="board" class="board"></div></div>
      </section>

      <aside class="panel sidebar">
        <div class="sidebar-header">💡 힌트 리스트</div>
        <div id="sidebarBody" class="sidebar-body">
          <div class="clue-title">가로</div>
          <div id="acrossList" class="clue-list"></div>
          <div class="clue-title">세로</div>
          <div id="downList" class="clue-list"></div>
        </div>
        <div class="footer-btns">
          <button id="submitBtn" class="action-btn">제출하기</button>
          <button id="resetBtn" class="action-btn">다시풀기</button>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const PUZZLE = {
      size: 15,
      words: [
        { id: "a1", no: 1, dir: "across", row: 2, col: 1, answer: "장애인차별금지법", chosung: "ㅈㅇㅇㅊㅂㄱㅈㅂ", hint: "장애를 이유로 차별받지 않도록 국가가 정한 법률이에요." },
        { id: "d2", no: 2, dir: "down", row: 0, col: 1, answer: "지체장애", chosung: "ㅈㅊㅈㅇ", hint: "팔, 다리나 몸통의 기능에 제한이 있는 상태를 말해요." },
        { id: "a3", no: 3, dir: "across", row: 12, col: 6, answer: "유니버설디자인", chosung: "ㅇㄴㅂㅅㄷㅈㅇ", hint: "장애 유무와 상관없이 누구나 편리하게 쓰도록 만드는 설계예요." },
        { id: "a4", no: 4, dir: "across", row: 5, col: 1, answer: "배리어프리", chosung: "ㅂㄹㅇㅍㄹ", hint: "장애인의 생활에 불편을 주는 물리적, 심리적 장벽을 없애는 운동이에요." },
        { id: "d5", no: 5, dir: "down", row: 4, col: 2, answer: "물리치료", chosung: "ㅁㄹㅊㄹ", hint: "운동이나 기구 등을 이용해 신체 기능을 회복하도록 돕는 활동이에요." },
        { id: "d6", no: 6, dir: "down", row: 0, col: 11, answer: "의사소통", chosung: "ㅇㅅㅅㅌ", hint: "말, 수어, 점자 등을 통해 서로의 생각과 마음을 주고받는 일이에요." },
        { id: "a7", no: 7, dir: "across", row: 1, col: 10, answer: "경사로", chosung: "ㄱㅅㄹ", hint: "휠체어나 유모차가 계단 대신 편하게 오르내릴 수 있는 비탈길이에요." },
        { id: "a8", no: 8, dir: "across", row: 10, col: 1, answer: "보조공학", chosung: "ㅂㅈㄱㅎ", hint: "장애인의 일상생활을 돕는 첨단 기기나 기술을 연구하는 분야예요." },
        { id: "d9", no: 9, dir: "down", row: 10, col: 4, answer: "학습권", chosung: "ㅎㅅㄱ", hint: "누구나 차별 없이 원하는 교육을 받을 수 있는 소중한 권리예요." },
        { id: "d10", no: 10, dir: "down", row: 2, col: 3, answer: "인권", chosung: "ㅇㄱ", hint: "사람이라면 누구나 태어날 때부터 가지는 기본적인 권리예요." },
        { id: "a11", no: 11, dir: "across", row: 0, col: 5, answer: "안내견", chosung: "ㅇㄴㄱ", hint: "시각장애인이 안전하게 길을 갈 수 있도록 안내하는 훈련된 개예요." },
        { id: "d12", no: 12, dir: "down", row: 6, col: 8, answer: "지적장애", chosung: "ㅈㅈㅈㅇ", hint: "지적 능력이 발달 단계에 비해 느려 도움이 필요한 상태를 말해요." },
        { id: "a13", no: 13, dir: "across", row: 8, col: 6, answer: "발달장애", chosung: "ㅂㄷㅈㅇ", hint: "지적장애와 자폐성장애를 아울러 부르는 말이에요." },
        { id: "d14", no: 14, dir: "down", row: 11, col: 11, answer: "점자", chosung: "ㅈㅈ", hint: "시각장애인이 손가락 끝으로 읽을 수 있게 만든 볼록한 글자예요." },
        { id: "a15", no: 15, dir: "across", row: 14, col: 1, answer: "수어", chosung: "ㅅㅇ", hint: "손의 움직임과 표정 등을 사용하는 청각장애인의 공용어예요." },
        { id: "a16", no: 16, dir: "across", row: 3, col: 11, answer: "통합교육", chosung: "ㅌㅎㄱㅇ", hint: "장애학생과 비장애학생이 한 교실에서 함께 배우며 성장하는 교육이에요." }
      ]
    };

    let state = { elapsedSec: 0, timerId: null, isFinished: false, grid: new Map(), currentWordId: "a1" };

    function init() {
      state.grid.clear();
      PUZZLE.words.forEach(w => {
        w.answer.split('').forEach((char, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          const key = `${r}-${c}`;
          if (!state.grid.has(key)) state.grid.set(key, { char, wordIds: [], startNo: null });
          state.grid.get(key).wordIds.push(w.id);
          if (i === 0) state.grid.get(key).startNo = w.no;
        });
      });
      renderBoard();
      renderClues();
      startTimer();
    }

    function renderBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${PUZZLE.size}, 1fr)`;
      for (let r = 0; r < PUZZLE.size; r++) {
        for (let c = 0; c < PUZZLE.size; c++) {
          const data = state.grid.get(`${r}-${c}`);
          const cell = document.createElement("div");
          cell.className = data ? "cell" : "cell block";
          cell.id = `cell-${r}-${c}`;
          if (data) {
            if (data.startNo) {
              const span = document.createElement("span");
              span.className = "cell-number";
              span.textContent = data.startNo;
              cell.appendChild(span);
            }
            const input = document.createElement("input");
            input.maxLength = 1;
            input.dataset.r = r; input.dataset.c = c;
            
            // 클릭 시 강조 및 힌트 자동 스크롤
            input.onfocus = () => {
              const wordId = data.wordIds[0];
              state.currentWordId = wordId;
              highlightWord(wordId);
              scrollToClue(wordId);
            };

            // 입력 시 자동 이동
            input.oninput = (e) => {
              e.target.value = e.target.value.replace(/[^ㄱ-ㅎ가-힣]/g, '');
              if (e.target.value.length === 1) {
                moveToNextCell(parseInt(input.dataset.r), parseInt(input.dataset.c));
              }
              updateProgress();
            };

            cell.appendChild(input);
          }
          board.appendChild(cell);
        }
      }
    }

    // 다음 칸으로 자동 포커스 이동
    function moveToNextCell(r, c) {
      const word = PUZZLE.words.find(w => w.id === state.currentWordId);
      if (!word) return;

      const idx = word.answer.split('').findIndex((_, i) => {
        const currR = word.row + (word.dir === "down" ? i : 0);
        const currC = word.col + (word.dir === "across" ? i : 0);
        return currR === r && currC === c;
      });

      if (idx !== -1 && idx < word.answer.length - 1) {
        const nextR = word.row + (word.dir === "down" ? (idx + 1) : 0);
        const nextC = word.col + (word.dir === "across" ? (idx + 1) : 0);
        const nextInput = document.querySelector(`input[data-r="${nextR}"][data-c="${nextC}"]`);
        if (nextInput) nextInput.focus();
      }
    }

    // 힌트 카드로 스크롤 이동
    function scrollToClue(wordId) {
      const clueCard = document.getElementById(`clue-${wordId}`);
      const sidebarBody = document.getElementById("sidebarBody");
      if (clueCard && sidebarBody) {
        const cardTop = clueCard.offsetTop;
        const bodyTop = sidebarBody.offsetTop;
        sidebarBody.scrollTo({
          top: cardTop - bodyTop - 10,
          behavior: 'smooth'
        });
      }
    }

    function renderClues() {
      document.getElementById("acrossList").innerHTML = "";
      document.getElementById("downList").innerHTML = "";
      PUZZLE.words.forEach(w => {
        const card = document.createElement("div");
        card.className = "clue-card";
        card.id = `clue-${w.id}`;
        card.innerHTML = `<div class="clue-header"><span class="badge ${w.dir}">${w.no}</span><span class="chosung-pill">${w.chosung}</span></div><div class="clue-desc">${w.hint}</div>`;
        card.onclick = () => {
          state.currentWordId = w.id;
          highlightWord(w.id);
          const targetInput = document.querySelector(`input[data-r="${w.row}"][data-c="${w.col}"]`);
          if(targetInput) targetInput.focus();
        };
        document.getElementById(w.dir === "across" ? "acrossList" : "downList").appendChild(card);
      });
    }

    function highlightWord(wordId) {
      const word = PUZZLE.words.find(w => w.id === wordId);
      if(!word) return;
      document.querySelectorAll('.cell').forEach(el => el.classList.remove('active-cell', 'highlight'));
      document.querySelectorAll('.clue-card').forEach(el => el.classList.remove('active-clue'));
      
      const activeClue = document.getElementById(`clue-${wordId}`);
      if(activeClue) activeClue.classList.add('active-clue');

      word.answer.split('').forEach((_, i) => {
        const r = word.row + (word.dir === "down" ? i : 0);
        const c = word.col + (word.dir === "across" ? i : 0);
        const cellEl = document.getElementById(`cell-${r}-${c}`);
        if(cellEl) {
          cellEl.classList.add('highlight');
          if(i === 0) cellEl.classList.add('active-cell');
        }
      });
    }

    function updateProgress() {
      let solved = 0;
      PUZZLE.words.forEach(w => {
        const userAns = w.answer.split('').map((_, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          const input = document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
          return input ? input.value : "";
        }).join('');
        if (userAns === w.answer) solved++;
      });
      document.getElementById("solvedCountText").textContent = `${solved} / ${PUZZLE.words.length}`;
      document.getElementById("progressFill").style.width = `${(solved / PUZZLE.words.length) * 100}%`;
    }

    function startTimer() {
      if(state.timerId) clearInterval(state.timerId);
      state.timerId = setInterval(() => {
        if (!state.isFinished) {
          state.elapsedSec++;
          const m = String(Math.floor(state.elapsedSec / 60)).padStart(2, '0');
          const s = String(state.elapsedSec % 60).padStart(2, '0');
          document.getElementById("timer").textContent = `${m}:${s}`;
        }
      }, 1000);
    }

    document.getElementById("submitBtn").onclick = () => {
      let correctCount = 0;
      PUZZLE.words.forEach(w => {
        const userAns = w.answer.split('').map((_, i) => {
          const r = w.row + (w.dir === "down" ? i : 0);
          const c = w.col + (w.dir === "across" ? i : 0);
          const input = document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
          return input ? input.value : "";
        }).join('');
        if (userAns === w.answer) correctCount++;
      });

      if (correctCount === PUZZLE.words.length) {
        state.isFinished = true;
        clearInterval(state.timerId);
        const m = Math.floor(state.elapsedSec / 60);
        const s = state.elapsedSec % 60;
        alert(`🎉 축하합니다! 모든 문제를 맞히셨습니다!\n⏱ 소요 시간: ${m}분 ${s}초`);
      } else {
        alert(`🧐 아직 완성되지 않았거나 틀린 부분이 있어요!\n(현재 ${correctCount} / ${PUZZLE.words.length} 정답)`);
      }
    };

    document.getElementById("resetBtn").onclick = () => { if(confirm("모든 입력을 지우고 다시 시작할까요?")) location.reload(); };

    init();
  </script>
</body>
</html>
